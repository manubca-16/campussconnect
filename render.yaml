services:
  - type: web
    name: campusconnect-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CERTIFICATE_STORAGE_PATH
        value: ./storage/certificates
      - key: TEMPLATE_STORAGE_PATH
        value: ./storage/templates

